# Configures slf4j-simple, which replaced logback-classic as the SLF4J binding (see impl/pom.xml)
# to cut Lambda jar size - logback's file rotation/async appenders/layout engine were all unused
# weight here, since Lambda captures stdout/stderr into CloudWatch Logs directly.
# Equivalent to the old logback.xml: INFO root level, timestamps, console output to stdout.
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.logFile=System.out
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=false
