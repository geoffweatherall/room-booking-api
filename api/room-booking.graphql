schema {
 query: Query
 mutation: Mutation
}

type Query {
 people: [Person!]!
 rooms: [Room!]!
 bookings(filter: BookingsFilter): [Booking!]!
 "The Person linked to the signed-in caller's own Cognito account, or null if none exists (e.g. the account predates automatic Person creation on sign-up, or was created without going through the confirm-sign-up flow)."
 myPerson: Person
}

"Filters for Query.bookings. All fields are optional and combine with AND; omitting the input (or all fields) returns every booking, unchanged from the default behaviour."
input BookingsFilter {
    "Restricts to bookings whose time range overlaps [fromStartTime, toEndTime) - i.e. startTime < toEndTime and endTime > fromStartTime, the same overlap rule createBooking already enforces. Both are ISO-8601 local date-times (java.time.LocalDateTime semantics, no time-zone offset) and must be supplied together."
    fromStartTime: String
    toEndTime: String
    "Restricts to bookings where this person is the organiser or one of the attendees."
    personId: ID
}

type Mutation {
 createRoom(room: RoomInput!): CreateRoomResult!
 createPerson(person: PersonInput!): Person!
 createBooking(booking: BookingInput!): CreateBookingResult!
 "Deletes all stored rooms and bookings, and every person except those linked to a Cognito account."
 reset: Boolean!
}

type Room {
   id: ID!
   name: String!
   capacity: Int!
}

input RoomInput {
   name: String!
   "Must be 2 or more."
   capacity: Int!
}

type CreateRoomResult {
    "Populated when the room passed all validation rules and was created."
    room: Room
    "Non-empty when the room was rejected; one entry per validation rule broken."
    errors: [RoomError!]!
}

enum RoomError {
    NameRequired
    CapacityTooLow
}


type Person {
    id: ID!
    name: String!
}

input PersonInput {
    name: String!
}

type Booking {
    id: ID!
    room: Room!
    organiser: Person!
    attendees: [Person!]!
    subject: String!
    "ISO-8601 local date-time with no time-zone offset (java.time.LocalDateTime semantics), e.g. \"2026-07-01T14:30:00\"."
    startTime: String!
    "ISO-8601 local date-time with no time-zone offset (java.time.LocalDateTime semantics), e.g. \"2026-07-01T15:00:00\"."
    endTime: String!
}

input BookingInput {
    roomId: ID!
    organiserId: ID!
    attendeeIds: [ID!]!
    "Must not be null or blank."
    subject: String!
    "ISO-8601 local date-time with no time-zone offset, must fall on a 5 minute boundary, e.g. \"2026-07-01T14:30:00\". Must be on the same calendar date as endTime - a booking cannot span midnight."
    startTime: String!
    "ISO-8601 local date-time with no time-zone offset, must fall on a 5 minute boundary, e.g. \"2026-07-01T15:00:00\". Must be on the same calendar date as startTime - a booking cannot span midnight."
    endTime: String!
}

type CreateBookingResult {
    "Populated when the booking passed all validation rules and was created."
    booking: Booking
    "Non-empty when the booking was rejected; one entry per validation rule broken."
    errors: [BookingError!]!
}

enum BookingError {
    StartMissaligned
    EndMissaligned
    "startTime and endTime fall on different calendar dates - a booking cannot span midnight."
    SpansMultipleDays
    InsufficientCapacity
    TimeRangeUnavailable
    RoomRequired
    RoomNotFound
    OrganiserRequired
    OrganiserNotFound
    AttendeeNotFound
    SubjectRequired
}


